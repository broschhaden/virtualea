<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact | Birgit Rosch Haden</title>
<meta name="description" content="Get in touch with Birgit Rosch Haden for warm, thoughtful executive support." />

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --cream: #f4eee5;
  --cream-deep: #e7ddd0;
  --blue: #6f879c;
  --blue-deep: #4f6578;
  --ink: #24323d;
  --muted: #6f746f;
  --white: #ffffff;
  --border: rgba(79,101,120,0.16);
  --shadow: 0 18px 45px rgba(36, 50, 61, 0.09);
  --field-bg: #f8f6f1;
  --max-width: 1180px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(180deg, var(--cream) 0%, #fbf8f3 38%, #f7f2eb 100%);
  color: var(--ink);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a {
  color: inherit;
  text-decoration: none;
}

.container {
  width: min(calc(100% - 32px), var(--max-width));
  margin: 0 auto;
}

/* HEADER */
.site-header {
  position: sticky;
  top: 0;
  z-index: 1000;
  backdrop-filter: blur(14px);
  background: var(--blue-deep);
  border-bottom: 1px solid rgba(255,255,255,0.15);
}

.header-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 24px;
  padding: 18px 0;
}

.brand {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.brand-mark {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  line-height: 1;
  letter-spacing: 0.02em;
  color: var(--white);
}

.brand-sub {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: rgba(255,255,255,0.75);
}

.nav {
  display: flex;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}

.nav a {
  font-size: 0.92rem;
  color: var(--white);
  position: relative;
}

.nav a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -5px;
  width: 100%;
  height: 1px;
  background: var(--white);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.25s ease;
}

.nav a:hover::after,
.nav a:focus-visible::after,
.nav a.active::after {
  transform: scaleX(1);
}

/* HERO */
.hero {
  padding: 78px 0 38px;
  text-align: center;
}

.eyebrow {
  display: inline-block;
  margin-bottom: 18px;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: var(--blue-deep);
}

h1, h2, h3 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  line-height: 0.98;
  letter-spacing: -0.01em;
}

.hero h1 {
  font-size: clamp(3rem, 6vw, 5.2rem);
  margin-bottom: 18px;
}

.hero p {
  max-width: 60ch;
  margin: 0 auto;
  color: #55626d;
  font-size: 1.04rem;
  line-height: 1.7;
}

/* FORM WRAP */
.contact-section {
  padding: 12px 0 80px;
}

.form-card {
  max-width: 900px;
  margin: 0 auto;
}

.form-card h3 {
  font-size: 2rem;
  margin-bottom: 28px;
  color: var(--ink);
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

.form-group {
  margin-bottom: 22px;
}

label {
  display: block;
  margin-bottom: 10px;
  font-size: 0.95rem;
  color: var(--ink);
}

.required-star {
  color: var(--blue-deep);
  font-weight: 700;
  margin-left: 4px;
}

input,
textarea,
select {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid #bfc6ca;
  background: var(--field-bg);
  border-radius: 0;
  font-family: inherit;
  font-size: 1rem;
  color: var(--ink);
  outline: none;
  appearance: none;
}

input:focus,
textarea:focus,
select:focus {
  border-color: var(--blue-deep);
}

textarea {
  min-height: 120px;
  resize: vertical;
}

.large-textarea {
  min-height: 150px;
}

.select-wrap {
  position: relative;
}

.select-wrap::after {
  content: "⌄";
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-52%);
  pointer-events: none;
  font-size: 1.4rem;
  color: var(--ink);
}

.submit-wrap {
  text-align: center;
  margin-top: 18px;
}

button {
  background: var(--blue-deep);
  color: #fff;
  border: none;
  padding: 14px 26px;
  min-width: 98px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.25s ease;
}

button:hover {
  background: var(--blue);
}

/* MOBILE */
@media (max-width: 760px) {
  .header-inner {
    flex-direction: column;
    align-items: flex-start;
  }

  .nav {
    gap: 14px 18px;
  }

  .hero {
    padding: 56px 0 38px;
  }

  .hero h1 {
    font-size: 2.5rem;
  }

  .form-row {
    grid-template-columns: 1fr;
    gap: 0;
  }
}
</style>
</head>

<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="brand" aria-label="Homepage">
        <span class="brand-mark">Rosch Haden</span>
        <span class="brand-sub">Executive Partner to Founders and Leaders</span>
    </a>

    <nav class="nav" aria-label="Main navigation">
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="reviews.html">Reviews</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="container">
    <span class="eyebrow">Contact</span>
    <h1>Let’s work together</h1>
    <p>
      Whether you’re ready to get started or just want to ask a question,
      I’d love to hear from you.
    </p>
  </div>
</section>

<script>
  // This script checks the URL for ?success=true and displays an alert
  window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('success') === 'true') {
      alert("Thank you! Your message has been sent successfully.");
      // Optional: Clean up the URL after showing the message
      window.history.replaceState({}, document.title, window.location.pathname);
    }
  };
</script>
  
<section class="contact-section">
  <div class="container">
    <div class="form-card">
      <h3>Get in touch</h3>

      <form action="/api/submit" method="POST">
        <div class="form-row">
          <div class="form-group">
            <label for="first-name">First Name <span class="required-star">*</span></label>
            <input type="text" id="first-name" name="first_name" required>
          </div>

          <div class="form-group">
            <label for="last-name">Last Name <span class="required-star">*</span></label>
            <input type="text" id="last-name" name="last_name" required>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email <span class="required-star">*</span></label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone <span class="required-star">*</span></label>
          <input type="tel" id="phone" name="phone" required>
        </div>

        <div class="form-group">
          <label for="company">Company</label>
          <input type="text" id="company" name="company">
        </div>

        <div class="form-group">
          <label for="hear-about">How did you hear about Birgit Rosch Haden? <span class="required-star">*</span></label>
          <input type="text" id="hear-about" name="hear_about" required>
        </div>

        <div class="form-group">
          <label for="support-needed">Support needed / project overview / tasks that you would love to offload <span class="required-star">*</span></label>
          <textarea id="support-needed" name="support_needed" class="large-textarea" required></textarea>
        </div>

        <div class="form-group">
          <label for="hours-required">Hours per month required <span class="required-star">*</span></label>
          <div class="select-wrap">
            <select id="hours-required" name="hours_required" required>
              <option value="" selected disabled>Select an option</option>
              <option>5–10 hours</option>
              <option>10–20 hours</option>
              <option>20–40 hours</option>
              <option>40+ hours</option>
              <option>Not sure yet</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>

        <div class="submit-wrap">
          <button type="submit">Submit</button>
        </div>
      </form>
    </div>
  </div>
</section>

</body>
</html>
